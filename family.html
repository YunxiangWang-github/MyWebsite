<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Family | Yunxiang Wang</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="site-shell">
      <header class="topbar">
        <a class="brand" href="index.html">Yunxiang Wang</a>
        <nav class="nav">
          <a href="index.html">Home</a>
          <a class="active" href="family.html">Family</a>
          <a href="hobby.html">Hobby</a>
          <a href="professional.html">Professional</a>
        </nav>
      </header>

      <main class="section-stack">
        <section class="panel fade-up">
          <span class="tag">Family</span>
          <h1>Family Photos</h1>
          <p>和家人在一起的日常与旅行照片。</p>
        </section>

        <section class="stack-swiper fade-up" data-stack-swipe>
          <div class="stack-track">
            <figure class="stack-card"><img src="assets/images/family03.jpg" alt="家庭照片 1" /></figure>
            <figure class="stack-card"><img src="assets/images/family05.jpg" alt="家庭照片 2" /></figure>
            <figure class="stack-card"><img src="assets/images/family04.jpg" alt="家庭照片 3" /></figure>
            <figure class="stack-card"><img src="assets/images/family01.jpg" alt="家庭照片 4" /></figure>
            <figure class="stack-card"><img src="assets/images/family02.jpg" alt="家庭照片 5" /></figure>
          </div>
          <div class="stack-controls">
            <button class="stack-btn" type="button" data-stack-dir="prev">← 上一张</button>
            <button class="stack-btn" type="button" data-stack-dir="next">下一张 →</button>
          </div>
        </section>

      </main>

      <footer>© <span data-year></span> Yunxiang Wang. All rights reserved.</footer>
    </div>
    <script src="script.js"></script>
  </body>
</html>
